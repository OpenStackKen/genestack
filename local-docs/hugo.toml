baseURL = "/"
languageCode = "en-us"
title = "Genestack Local Docs"
enableRobotsTXT = true

[module]
  proxy = "direct"

[[module.imports]]
  path = "github.com/google/docsy"

[[module.imports]]
  path = "github.com/martignoni/hugo-notice"

[[module.mounts]]
  source = "../docs/_index.md"
  target = "content/_index.md"

[[module.mounts]]
  source = "../docs/overview"
  target = "content/overview"

[[module.mounts]]
  source = "../docs/design-guide"
  target = "content/design-guide"

[[module.mounts]]
  source = "../docs/deployment-guide"
  target = "content/deployment-guide"

[[module.mounts]]
  source = "../docs/operational-guide"
  target = "content/operational-guide"

[[module.mounts]]
  source = "../docs/cloud-onboarding"
  target = "content/cloud-onboarding"

[[module.mounts]]
  source = "../docs/security-primer"
  target = "content/security-primer"

[[module.mounts]]
  source = "../docs/regions"
  target = "content/regions"

[[module.mounts]]
  source = "../docs/info"
  target = "content/info"

[[module.mounts]]
  source = "../docs/assets"
  target = "static/assets"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  github_repo = "https://github.com/rackerlabs/genestack"
  github_subdir = ""
  time_format_blog = "2006-01-02"

  [params.ui]
    breadcrumb_disable = false
    sidebar_menu_compact = true
    navbar_logo = false

[menu]
  [[menu.main]]
    name = "Overview"
    url = "/overview/"
    weight = 10

  [[menu.main]]
    name = "Design Guide"
    url = "/design-guide/"
    weight = 20

  [[menu.main]]
    name = "Deployment Guide"
    url = "/deployment-guide/"
    weight = 30

  [[menu.main]]
    name = "Operational Guide"
    url = "/operational-guide/"
    weight = 40

  [[menu.main]]
    name = "Cloud Onboarding"
    url = "/cloud-onboarding/"
    weight = 50

  [[menu.main]]
    name = "Security Primer"
    url = "/security-primer/"
    weight = 60

  [[menu.main]]
    name = "Regions"
    url = "/regions/"
    weight = 70
