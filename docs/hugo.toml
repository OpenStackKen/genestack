baseURL = "/"
languageCode = "en-us"
title = "Genestack Documentation"
enableRobotsTXT = true

[module]
  proxy = "direct"

[[module.imports]]
  path = "github.com/google/docsy"

[[module.imports]]
  path = "github.com/martignoni/hugo-notice"

[[module.mounts]]
  source = "content"
  target = "content"

[[module.mounts]]
  source = "content/assets"
  target = "static/assets"

[[module.mounts]]
  source = "assets"
  target = "assets"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
  github_repo = "https://github.com/rackerlabs/genestack"
  github_subdir = ""
  time_format_blog = "2006-01-02"

  [params.ui]
    breadcrumb_disable = false
    sidebar_menu_compact = true
    navbar_logo = false

[menu]
  [[menu.main]]
    name = "Overview"
    url = "/overview/"
    weight = 10

  [[menu.main]]
    name = "Design Guide"
    url = "/design-guide/"
    weight = 20

  [[menu.main]]
    name = "Deployment Guide"
    url = "/deployment-guide/"
    weight = 30

  [[menu.main]]
    name = "Operational Guide"
    url = "/operational-guide/"
    weight = 40

  [[menu.main]]
    name = "Cloud Onboarding"
    url = "/cloud-onboarding/"
    weight = 50

  [[menu.main]]
    name = "Security Primer"
    url = "/security-primer/"
    weight = 60

  [[menu.main]]
    name = "Regions"
    url = "/regions/"
    weight = 70
