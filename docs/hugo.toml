baseURL = "/"
languageCode = "en-us"
title = "Genestack Documentation"
enableRobotsTXT = true

[module]
proxy = "direct"

[[module.imports]]
path = "github.com/KKKZOZ/hugo-admonitions"

[[module.imports]]
path = "github.com/google/docsy"

[[module.mounts]]
source = "content"
target = "content"

[[module.mounts]]
source = "content/assets"
target = "static/assets"

[[module.mounts]]
source = "assets"
target = "assets"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.highlight]
style = "hrdark"

[params]
github_repo = "https://github.com/OpenStackKen/genestack"
github_branch = "docs-refactor"
github_subdir = "docs"
time_format_blog = "2006-01-02"
btn-lg = 'class="btn btn-lg btn-{1}" role="button"'
FA = '<i class="fa-{1} fa-{2} text-{3} px-1"></i>'
logo = "assets/images/genestack-logo.png"
#version_menu = "Releases"

#[[params.versions]]
#  version = "latest"
#  url = "https://docs.rackspacecloud.com/latest"

[params.mermaid]
version = "11.14.0"
theme = "default"

[params.ui]
breadcrumb_disable = false
sidebar_menu_compact = true
navbar_logo = true

[menu]
[[menu.main]]
name = "Overview"
url = "/overview/"
weight = 10

[[menu.main]]
name = "Design Guide"
url = "/design-guide/"
weight = 20

[[menu.main]]
name = "Deployment Guide"
url = "/deployment-guide/"
weight = 30

[[menu.main]]
name = "Operations Guide"
url = "/operational-guide/"
weight = 40

[[menu.main]]
name = "Cloud Onboarding"
url = "/cloud-onboarding/"
weight = 50
