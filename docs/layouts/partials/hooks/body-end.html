<style>
  @media (min-width: 768px) {
    body.td-page main.td-main,
    body.td-section main.td-main,
    body.td-taxonomy main.td-main,
    body.td-term main.td-main {
      padding-top: calc(var(--td-main-padding-top, 1.5rem) + 64px);
    }
  }
</style>

<script type="module">
  const diagrams = document.querySelectorAll("pre.mermaid");
  if (diagrams.length > 0) {
    const { default: mermaid } = await import("https://cdn.jsdelivr.net/npm/mermaid@{{ .Site.Params.mermaid.version }}/dist/mermaid.esm.min.mjs");

    const settings = {{ with .Site.Params.mermaid }}{{ . | jsonify | safeJS }}{{ else }}{}{{ end }};
    settings.startOnLoad = false;

    if (!settings.theme && document.documentElement.getAttribute("data-bs-theme") === "dark") {
      settings.theme = "dark";
    }

    mermaid.initialize(settings);
    await mermaid.run({ querySelector: "pre.mermaid" });

    const observer = new MutationObserver((mutationsList) => {
      for (const mutation of mutationsList) {
        if (mutation.type === "attributes" && mutation.attributeName === "data-bs-theme") {
          location.reload();
        }
      }
    });

    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["data-bs-theme"]
    });
  }
</script>
