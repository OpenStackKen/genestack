<table class="td-table">
  {{- if .THead }}
    <thead>
      {{- range .THead }}
        <tr>
          {{- range . }}
            <th>{{ .Text }}</th>
          {{- end }}
        </tr>
      {{- end }}
    </thead>
  {{- end }}
  <tbody>
    {{- range .TBody }}
      <tr>
        {{- range . }}
          <td>{{ .Text }}</td>
        {{- end }}
      </tr>
    {{- end }}
  </tbody>
</table>
